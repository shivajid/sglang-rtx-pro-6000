
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: distributed-sglang
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distributed-sglang
  serviceName: ""
  template:
    metadata:
      labels:
        app: distributed-sglang
    spec:
      containers:
      - name: sglang-container
        image: docker.io/lmsysorg/sglang:v0.5.10.post1
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -c
        args:
        - |
          nsys profile --trace-fork-before-exec=true \
              --cuda-graph-trace=node \
              --capture-range=cudaProfilerApi \
              --capture-range-end=stop \
              -o profile.out \
          python3 -m sglang.launch_server \
              --model moonshotai/Kimi-K2.5 \
              --tensor-parallel-size 8 \
              --pipeline-parallel-size 2 \
              --nnodes 2 \
              --node-rank $POD_INDEX \
              --port 8000 \
              --dist-init-addr sglang-master-pod:5000 \
              --trust-remote-code \
              --kv-cache-dtype fp8_e5m2 \
              --reasoning-parser kimi_k2 \
              --tool-call-parser kimi_k2 \
              --mem-fraction-static 0.85 \
              --chunked-prefill-size 16384 \
              --host 0.0.0.0 

        env:
        - name: POD_INDEX
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        - name: NCCL_DEBUG
          value: INFO
        - name: NCCL_SOCKET_IFNAME
          # value: "eth0"
          value: "eth0,eth1"
        - name: NCCL_IB_DISABLE
          value: "1"
        - name: NCCL_P2P_LEVEL
          value: "SYS"
        - name: NCCL_SOCKET_NTHREADS
          value: "8"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "8"
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        resources:
          limits:
            nvidia.com/gpu: "8"
          requests:
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /root/.cache/huggingface
          name: hf-cache
        securityContext:
          privileged: true  
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 10Gi
        name: dshm
      - name: hf-cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-master-pod
spec:
  type: ClusterIP
  selector:
    app: distributed-sglang
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: dist-port
    port: 5000
    targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-serving-on-master
spec:
  type: NodePort
  selector:
    app: distributed-sglang
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: serving
    port: 8000
    targetPort: 8000
  - name: metrics
    port: 8080
    targetPort: 8080
